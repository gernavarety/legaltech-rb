version: '3.9'

# ────────────────────────────────────────────────────────────────
# LexAI.by — AI-анализ договоров для юристов Республики Беларусь
# Версия 2.0 — с подпиской, Bepaid, Supabase Auth
#
# Запуск:
#   cp .env.example .env       # заполнить значения
#   docker compose up -d
#   docker compose exec backend python scripts/seed_plans.py
# ────────────────────────────────────────────────────────────────

networks:
  legaltech:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────
  pgvector:
    image: ankane/pgvector:latest
    container_name: legaltech-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: legaltech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Автоматическое применение миграций при первом запуске
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - legaltech
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legaltech"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis (брокер Celery + кэш курсов валют) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: legaltech-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks:
      - legaltech
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── FastAPI бэкенд ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legaltech-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass}@pgvector:5432/legaltech
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - legaltech
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Celery Worker (обычная очередь) ───────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legaltech-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass}@pgvector:5432/legaltech
      REDIS_URL: redis://redis:6379
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - legaltech
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
      --hostname=worker@%h

  # ── Celery Priority Worker (очередь для FIRM тарифа) ──────────
  worker-priority:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legaltech-worker-priority
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass}@pgvector:5432/legaltech
      REDIS_URL: redis://redis:6379
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - legaltech
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=priority
      --hostname=priority-worker@%h

  # ── Celery Generation Worker (DOCX/PDF + LibreOffice) ─────────
  # Отдельный worker с LibreOffice для задач генерации документов.
  # Использует Dockerfile.worker (тяжелее, ~800 МБ).
  worker-generation:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: legaltech-worker-generation
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass}@pgvector:5432/legaltech
      REDIS_URL: redis://redis:6379
      # LibreOffice требует HOME для временных файлов
      HOME: /tmp
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - legaltech
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    # concurrency=2 — LibreOffice тяжёлый, не масштабировать выше 4
    command: >
      celery -A generation_task.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=generation,priority
      --hostname=generation-worker@%h
      --max-tasks-per-child=50

  # ── Flower (мониторинг Celery) ────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legaltech-flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    networks:
      - legaltech
    command: >
      celery -A tasks.celery_app flower
      --port=5555
      --broker=redis://redis:6379
    profiles:
      - monitoring

  # ── Next.js Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    container_name: legaltech-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - legaltech
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
